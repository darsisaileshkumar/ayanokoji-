<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayanokoji Voice</title>
    <meta name="description" content="Voice conversation interface for Ayanokoji">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hidden Debug Panel -->
    <div id="debug-panel" class="debug-panel hidden">
        <div class="debug-header">Debug Panel (Tap 5x to hide)</div>
        <div class="debug-content">
            <p><strong>Session ID:</strong> <span id="debug-session-id">-</span></p>
            <p><strong>Webhook URL:</strong> <span id="debug-webhook-url">-</span></p>
            <p><strong>Last Req Time:</strong> <span id="debug-req-time">-</span></p>
            <p><strong>Last Res Time:</strong> <span id="debug-res-time">-</span></p>
            <p><strong>Duration:</strong> <span id="debug-duration">-</span></p>
            <p><strong>State:</strong> <span id="debug-state">-</span></p>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <h1 id="app-title">Ayanokoji</h1>
            <div class="status-indicator">
                <span class="status-text" id="status-text">Disconnected</span>
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="welcome-message">
                <div class="glass-card">
                    <p>Tap the Orb to begin the conversation.</p>
                </div>
            </div>
        </main>

        <footer class="controls">
            <div class="orb-wrapper">
                <div id="orb" class="orb disconnected" aria-label="Orb">
                    <div class="orb-core"></div>
                    <div class="orb-glow"></div>
                </div>
                <div class="ripple-ring"></div>
                <div class="ripple-ring delay"></div>
            </div>
        </footer>
    </div>
    
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
