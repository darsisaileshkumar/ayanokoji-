<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayanokoji Voice</title>
    <meta name="description" content="Voice conversation interface for Ayanokoji">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Ayanokoji</h1>
            <div class="status-indicator">
                <span class="dot"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="welcome-message">
                <div class="glass-card">
                    <p>Tap the microphone to start the conversation.</p>
                </div>
            </div>
        </main>

        <footer class="controls">
            <div class="mic-wrapper">
                <button id="mic-btn" class="mic-btn" aria-label="Microphone">
                    <svg viewBox="0 0 24 24" class="mic-icon">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <div class="ripple-ring"></div>
                <div class="ripple-ring delay"></div>
            </div>
        </footer>
    </div>
    
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
